# nginx configuration for ackmud.com, aha.ackmud.com, and bailes.us
#
# Provides:
#   - HTTP → HTTPS redirect (port 80) for all domains
#   - ACME challenge webroot for certbot (port 80)
#   - HTTPS static file serving for Blazor WASM (ackmud.com, aha.ackmud.com)
#   - HTTPS static file serving for React SPA (bailes.us)
#   - /api/* reverse proxy to AckWeb.Api (port 5000) for AHA and WOL
#   - Secure WebSocket (WSS) proxies for MUD game servers
#
# Install:
#   sudo cp nginx/ackmud.conf /etc/nginx/sites-available/ackmud.conf
#   sudo ln -sf /etc/nginx/sites-available/ackmud.conf /etc/nginx/sites-enabled/ackmud.conf
#   sudo rm -f /etc/nginx/conf.d/ackmud-wss.conf   # remove acktng's old config
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificates:
#   certbot certonly --webroot --webroot-path /var/www/certbot \
#     -d ackmud.com -d www.ackmud.com -d aha.ackmud.com
#   certbot certonly --webroot --webroot-path /var/www/certbot \
#     -d bailes.us -d www.bailes.us

# ── HTTP: redirect + ACME challenge ───────────────────────────────────────────
server {
    listen 80;
    server_name ackmud.com www.ackmud.com aha.ackmud.com bailes.us www.bailes.us;

    # Serve Let's Encrypt ACME challenge files (used by certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: AHA: World of Lore (ackmud.com) ────────────────────────────────────
server {
    listen 443 ssl;
    server_name ackmud.com www.ackmud.com;

    ssl_certificate     /etc/letsencrypt/live/ackmud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ackmud.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /root/web/publish/wol/wwwroot;

    # Proxy API requests to AckWeb.Api
    location /api/ {
        proxy_pass              http://127.0.0.1:5000;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # Serve game images and audio
    location /img/ {
        root /root/web;
    }
    location /web/mp3/ {
        alias /root/web/mp3/;
    }

    # Blazor WASM SPA: fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── HTTPS: ACKmud Historical Archive (aha.ackmud.com) ─────────────────────────
