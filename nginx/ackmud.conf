# ── HTTPS: Personal site (bailes.us) ──────────────────────────────────────────
# Serves the pre-built React SPA from personal/dist/ directly via nginx.
# After any change to web/personal/src/, run: cd /root/web/personal && npm run build
server {
    listen 443 ssl;
    server_name bailes.us www.bailes.us;

    ssl_certificate     /etc/letsencrypt/live/bailes.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bailes.us/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /root/web/personal/dist;

    # React SPA: fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── WSS proxy: ACK!TNG (port 18890) ───────────────────────────────────────────
# Game servers run on the acktng host (192.168.1.103); nginx proxies WSS from
# the web container (192.168.1.113) to the game servers over the LAN.
server {
    listen 18890 ssl;
    server_name ackmud.com;

    ssl_certificate     /etc/letsencrypt/live/ackmud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ackmud.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass          http://192.168.1.103:18890;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

